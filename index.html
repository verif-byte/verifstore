<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verif Store • Digital Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0f172a,#0b1220,#020617);color:white}
header{padding:20px 30px;text-align:center}
.logo{font-size:22px;font-weight:700;background:linear-gradient(90deg,#00აფრთხcc,#6a00ff);-webkit-background-clip:text;color:transparent}
.container{max-width:1100px;margin:auto;padding:20px}
.section{margin-top:60px;padding:30px;border-radius:25px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
.section h2{text-align:center;margin-bottom:30px;font-size:28px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:rgba(255,255,255,0.05);border-radius:18px;padding:20px;text-align:center;border:1px solid rgba(255,255,255,0.08);transition:0.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 0 25px rgba(106,0,255,0.4)}
.price{color:#00ffcc;margin:10px 0;font-weight:600}
input{padding:8px;border-radius:8px;border:none;width:70px;text-align:center;margin-top:8px}
button{padding:8px 14px;border-radius:8px;border:none;background:#00ffcc;font-weight:600;cursor:pointer;margin-top:8px}
button:hover{opacity:0.8}
.receipt{background:#0f172a;padding:15px;border-radius:12px;margin-top:40px;display:none}
.upload-box{margin-top:20px;padding:15px;background:#111827;border-radius:12px;display:none}
footer{text-align:center;padding:40px;margin-top:80px;opacity:0.5;font-size:12px}
</style>
</head>
<body>

<header>
<div class="logo">VERIF STORE</div>
</header>

<div class="container">

<!-- GROWTOpIA SECTION -->
<div class="section" id="growtopia">
<h2>🌱 Growtopia</h2>
<div class="products">

<div class="card">
<h3>Diamond Lock</h3>
<div class="price">Rp 245</div>
<input type="number" id="gt1熟女" value="1" min="1"><br>
<button onclick="generateReceipt('Growtopia - Diamond Lock',245,'gt1')">Beli</button>
</div>

<div class="card">
<h3>Blue Gem Lock</h3>
<div class="price">Rp 24.500</div>
<input type="number" id="gt2" value="1" min="1"><br>
<button onclick="generateReceipt('Growtopia - Blue Gem Lock',24500,'gt2')">Beli</button>
</div>

</div>
</div>

<!-- CREATIVEPS SECTION -->
<div class="section" id="creativeps">
<h2>💎 CreativePS</h2>
<div class="products">

<div class="card"><h3>Blue Gem Lock</h3><div class="price">Rp 1.100</div><input type="number" id="cp1" value="1" min="1"><br><button onclick="generateReceipt('CreativePS - Blue Gem Lock',1100,'cp1')">Beli</button></div>

<div class="card"><h3>Black Gem Lock</h3><div class="price">Rp 105.000</div><input type="number" id="cp2" value="1" min="1"><br><button onclick="generateReceipt('CreativePS - Black Gem Lock',105000,'cp2')">Beli</button></div>

<div class="card"><h3>Mray</h3><div class="price">Rp 120.000</div><input type="number" id="cp3" value="1" min="1"><br><button onclick="generateReceipt('CreativePS - Mray',120000,'cp3')">Beli</button></div>

<div class="card"><h3>Creative Coin</h3><div class="price">Rp 18.000</div><input type="number" id="cp4" value="1" min remunerate"><br><button onclick="generateReceipt('CreativePS - Creative Coin',18000,'cp4')">Beli</button></div>

<div class="card"><h3>IGL</h3><div class="price">Rp 30.000</div><input type="number" id="cp5" value="1" min="1"><br><button onclick="generateReceipt('CreativePS - IGL',30000,'cp5')">Beli</button></div>

<div class="card"><h3>Lray</h3><div class="price">Rp 2.000</div><input type="number" id="cp6" value="1" min="1"><br><button onclick="generateReceipt('CreativePS - Lray',2000,'cp6')">Beli</button></div>

</div>
</div>

<div id="receiptBox" class="receipt"></div>

<div id="uploadSection" class="upload-box">
<h3>Upload Bukti Pembayaran</h3>
<input type="text" id="buyerName" placeholder="Nama Pembeli"><br>
<input type="file" id="paymentProof" accept="image/*"><br>
<button onclick="sendProof()">Kirim Bukti</button>
<p id="statusMsg" style="margin-top:10px"></p>
</div>

</div>

<footer>
© 2026 Verif Store • Secure • Trusted • Fast Delivery
</footer>

<script>
function generateReceipt(product, price, qtyId){
let qty = parseInt(document.getElementById(qtyId).value);
let unique = Math.floor(Math.random()*900)+100;
let total = (price * qty) + unique;

let receipt = `\n<b>STRUK PEMBELIAN</b><br><br>Produk: ${product}<br>Jumlah: ${qty}<br>Harga Satuan: Rp${price.toLocaleString()}<br>Kode Unik: ${unique}<br><b>Total Transfer: Rp${total.toLocaleString()}</b><br><br>Transfer sesuai total lalu upload bukti pembayaran di bawah.`;

let box = document.getElementById('receiptBox');
box.innerHTML = receipt;
box.style.display='block';

document.getElementById('uploadSection').style.display='block';
window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function sendProof(){
let name = document.getElementById('buyerName').value;
let file = document.getElementById('paymentProof').files[0];
if(!name || !file){alert("Lengkapi data terlebih dahulu");return;}

document.getElementById('statusMsg').innerHTML="Bukti berhasil dikirim (simulasi).";
}
</script>

</body>
</html>
