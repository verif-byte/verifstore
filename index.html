<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verif Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#0b1220;color:white}
nav{
background:#0f1b2e;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
position:sticky;top:0;z-index:999
}
nav h1{color:#4ea1ff}
nav .menu span{
margin-left:20px;cursor:pointer
}
.cart{
background:#1c2d4a;
padding:8px 15px;
border-radius:8px;
cursor:pointer
}
.status{
text-align:center;
padding:10px;
background:#2a1a1a;
color:#ff6b6b;
display:none
}
.container{padding:30px}
.category{
display:flex;gap:10px;margin-bottom:20px
}
.category button{
padding:8px 15px;border:none;border-radius:8px;
background:#1c2d4a;color:white;cursor:pointer
}
.category .active{background:#4ea1ff}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px
}
.card{
background:#111c33;
border-radius:15px;
padding:15px;
box-shadow:0 0 15px rgba(78,161,255,.2);
transition:.3s
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(78,161,255,.5)
}
.card img{
width:100%;
height:120px;
object-fit:contain;
margin-bottom:10px
}
.price{
display:flex;justify-content:space-between;
font-size:13px;margin:10px 0
}
.price span{color:#4ea1ff}
.btn{
width:100%;
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px
}
.beli{background:#1e3a8a;color:white}
.jual{background:transparent;border:1px solid gold;color:gold}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center
}
.modal-content{
background:#111c33;
padding:20px;
border-radius:15px;
width:95%;
max-width:420px;
max-height:90vh;
overflow:auto
}
.modal-content input,select{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none
}
.modal-content button{
width:100%;
padding:8px;
background:#4ea1ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer
}
.invoice{
background:#0f1b2e;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:13px
}
.admin-btn{
background:#ff9800;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-left:10px
}
</style>
</head>
<body>

<nav>
<h1>Verif Store</h1>
<div class="menu">
<span onclick="openCheck()">Cek Pesanan</span>
<span class="admin-btn" onclick="openAdmin()">Admin</span>
<span class="cart" onclick="openCheckout()">🛒 <span id="cartCount">0</span></span>
</div>
</nav>

<div class="status" id="storeStatus">
⚠ Store Sedang Tutup - Pesanan diproses saat toko dibuka
</div>

<div class="container">

<div class="category">
<button class="active" onclick="filter('all',this)">Semua</button>
<button onclick="filter('growtopia',this)">Growtopia</button>
<button onclick="filter('creativeps',this)">CreativePS</button>
</div>

<div class="grid" id="productGrid"></div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-content">
<h3>Checkout</h3>
<input type="text" id="nama" placeholder="Nama">
<input type="text" id="idgame" placeholder="ID Game">
<select id="payment">
<option>QRIS</option>
<option>Dana - 0887437704858</option>
<option>Gopay - 081315495903</option>
<option>Paypal - farhanfaza02@gmail.com</option>
<option>Crypto USDT BEP20</option>
</select>

<img src="qris.png" style="width:100%;margin:10px 0">

<button onclick="confirmOrder()">Konfirmasi Pesanan</button>
<div class="invoice" id="invoice"></div>
</div>
</div>

<!-- CEK PESANAN -->
<div class="modal" id="checkModal">
<div class="modal-content">
<h3>Cek Pesanan</h3>
<input type="text" id="searchID" placeholder="Masukkan ID Pesanan">
<button onclick="checkOrder()">Cari</button>
<div class="invoice" id="resultOrder"></div>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="modal-content">
<h3>Admin Panel</h3>
<input type="password" id="adminPass" placeholder="Password Admin">
<button onclick="loginAdmin()">Login</button>
<div id="adminArea"></div>
</div>
</div>

<script>
let adminPassword="12345";

let products=[
{game:"growtopia",name:"Diamond Lock",jual:245,beli:230,img:"https://i.imgur.com/6oKQX0R.png"},
{game:"growtopia",name:"Blue Gem Lock",jual:24000,beli:23000,img:"https://i.imgur.com/FVZ7x7K.png"},
{game:"creativeps",name:"Blue Gem Lock",jual:1100,beli:900,img:"https://i.imgur.com/FVZ7x7K.png"},
{game:"creativeps",name:"Black Gem Lock",jual:105000,beli:95000,img:"https://i.imgur.com/B8aYp7O.png"},
{game:"creativeps",name:"Mray",jual:120000,beli:100000,img:"https://i.imgur.com/B8aYp7O.png"},
{game:"creativeps",name:"IGL",jual:20000,beli:12000,img:"https://i.imgur.com/6oKQX0R.png"},
{game:"creativeps",name:"Creative Coin",jual:18000,beli:15000,img:"https://i.imgur.com/6oKQX0R.png"},
{game:"creativeps",name:"Lray",jual:2000,beli:0,img:"https://i.imgur.com/6oKQX0R.png"}
];

let cart=[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];

function renderProducts(){
let grid=document.getElementById("productGrid");
grid.innerHTML="";
products.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card ${p.game}">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">
<div>Jual<br><span>Rp ${p.jual.toLocaleString()}</span></div>
<div>Beli<br><span>Rp ${p.beli.toLocaleString()}</span></div>
</div>
<button class="btn beli" onclick="addToCart(${i})">BELI</button>
</div>
`;
});
}
renderProducts();

function addToCart(i){
cart.push(products[i]);
document.getElementById("cartCount").innerText=cart.length;
}

function openCheckout(){checkoutModal.style.display="flex"}
function openCheck(){checkModal.style.display="flex"}
function openAdmin(){adminModal.style.display="flex"}

function confirmOrder(){
if(cart.length==0)return alert("Keranjang kosong");
let id="ORD"+Math.floor(Math.random()*99999);
let total=cart.reduce((a,b)=>a+b.beli,0);
let order={id,total,status:"Menunggu Pembayaran"};
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));
invoice.innerHTML=`ID: ${id}<br>Total: Rp ${total.toLocaleString()}<br>Status: ${order.status}`;
cart=[];
cartCount.innerText=0;
}

function checkOrder(){
let id=searchID.value;
let found=orders.find(o=>o.id==id);
resultOrder.innerHTML=found?`ID: ${found.id}<br>Total: Rp ${found.total.toLocaleString()}<br>Status: ${found.status}`:"Tidak ditemukan";
}

function loginAdmin(){
if(adminPass.value==adminPassword){
adminArea.innerHTML="<p>Login Berhasil</p><button onclick='toggleStore()'>Toggle Status Toko</button>";
}
}

function toggleStore(){
let s=document.getElementById("storeStatus");
s.style.display=s.style.display=="block"?"none":"block";
}

function filter(cat,btn){
document.querySelectorAll(".category button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".card").forEach(c=>{
c.style.display=(cat=="all"||c.classList.contains(cat))?"block":"none";
});
}
</script>

</body>
</html>
