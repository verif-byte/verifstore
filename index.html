<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verif Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f172a;color:white;overflow:hidden}

.slider{display:flex;width:400%;height:100vh;transition:0.5s}
.slide{width:100%;flex-shrink:0;padding:30px;display:flex;flex-direction:column;justify-content:center;align-items:center}

h1{margin-bottom:20px;font-size:28px}
select,input{width:90%;max-width:300px;padding:12px;margin:10px 0;border-radius:8px;border:none;font-size:14px}
button{padding:12px 20px;margin-top:15px;border:none;border-radius:8px;background:#06b6d4;color:white;font-weight:600;cursor:pointer}
button:hover{background:#0891b2}

.card{background:#1e293b;padding:20px;border-radius:12px;width:90%;max-width:350px;text-align:center}
.qris{width:200px;margin-top:15px}
.nav-btn{position:absolute;bottom:30px}
</style>
</head>
<body>

<div class="slider" id="slider">

<!-- SLIDE 1 -->
<div class="slide">
<h1>Pilih Game</h1>
<select id="game">
<option value="growtopia">Growtopia</option>
<option value="creativeps">CreativePS</option>
</select>
<button onclick="nextSlide()">Lanjut</button>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h1>Pilih Produk</h1>
<select id="product"></select>
<input type="number" id="qty" placeholder="Jumlah" value="1">
<button onclick="generateStruk()">Buat Struk</button>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<h1>Struk Pembelian</h1>
<div class="card" id="struk"></div>
<img src="qris.png" class="qris">
<button onclick="nextSlide()">Saya Sudah Bayar</button>
</div>

<!-- SLIDE 4 -->
<div class="slide">
<h1>Upload Bukti Transfer</h1>
<input type="file">
<p style="margin-top:20px">Put World & Owner Akan Diproses Otomatis</p>
</div>

</div>

<script>
let currentSlide=0;
const slider=document.getElementById('slider');

function nextSlide(){
currentSlide++;
slider.style.transform=`translateX(-${currentSlide*100}%)`;
}

const products={
growtopia:[
{name:"Diamond Lock",price:245},
{name:"Blue Gem Lock",price:24500}
],
creativeps:[
{name:"Blue Gem Lock",price:1100},
{name:"Black Gem Lock",price:105000},
{name:"Creative Coin",price:18000},
{name:"Mray",price:120000},
{name:"IGL",price:30000},
{name:"Lray",price:2000}
]
};

const gameSelect=document.getElementById('game');
const productSelect=document.getElementById('product');

function loadProducts(){
productSelect.innerHTML="";
products[gameSelect.value].forEach(p=>{
let opt=document.createElement('option');
opt.value=p.price;
opt.textContent=`${p.name} - Rp ${p.price.toLocaleString()}`;
productSelect.appendChild(opt);
});
}

loadProducts();
gameSelect.addEventListener('change',loadProducts);

function generateStruk(){
let price=parseInt(productSelect.value);
let qty=parseInt(document.getElementById('qty').value);
let total=price*qty;
let kode=Math.floor(Math.random()*900)+100;
let finalTotal=total+kode;

document.getElementById('struk').innerHTML=`
<p><b>Game:</b> ${gameSelect.value}</p>
<p><b>Total:</b> Rp ${total.toLocaleString()}</p>
<p><b>Kode Unik:</b> ${kode}</p>
<p><b>Transfer:</b> Rp ${finalTotal.toLocaleString()}</p>
`;

nextSlide();
}
</script>

</body>
</html>
