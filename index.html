<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verif Store</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
}

header{
background:black;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}

h1{
color:gold;
margin:0;
}

.status{
text-align:center;
padding:10px;
font-weight:bold;
}

.open{
color:#00ff88;
}

.closed{
color:red;
}

.container{
padding:20px;
}

.game-title{
font-size:22px;
color:gold;
margin-top:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
margin-top:10px;
}

.card{
background:#141414;
padding:15px;
border-radius:8px;
border:1px solid #222;
text-align:center;
}

.card button{
background:gold;
border:none;
padding:8px 15px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

.card button:hover{
background:#ffd700;
}

.checkout{
position:fixed;
bottom:0;
left:0;
right:0;
background:black;
border-top:2px solid gold;
padding:15px;
display:none;
}

.checkout h3{
color:gold;
margin-top:0;
}

.payment{
margin-top:10px;
}

.payment button{
margin:5px;
padding:8px 12px;
border:none;
background:gold;
font-weight:bold;
cursor:pointer;
}

.qris{
text-align:center;
margin-top:10px;
}

.qris img{
width:200px;
}

.admin{
position:fixed;
top:10px;
right:10px;
}

.admin button{
background:gold;
border:none;
padding:6px 10px;
cursor:pointer;
}

</style>
</head>


<body>

<header>
<h1>VERIF STORE</h1>
</header>

<div class="admin">
<button onclick="toggleStore()">Admin Buka/Tutup</button>
</div>

<div id="status" class="status open">
STORE BUKA
</div>

<div class="container">

<div class="game-title">Growtopia</div>

<div class="products">

<div class="card">
Diamond Lock
<br>
Rp 245
<br>
<button onclick="buy('Diamond Lock','245')">Beli</button>
</div>

<div class="card">
Blue Gem Lock
<br>
Rp 24.000
<br>
<button onclick="buy('Blue Gem Lock','24000')">Beli</button>
</div>

</div>


<div class="game-title">CreativePS</div>

<div class="products">

<div class="card">
Blue Gem Lock
<br>
Rp 1.000
<br>
<button onclick="buy('Blue Gem Lock CPS','1100')">Beli</button>
</div>

<div class="card">
Black Gem Lock
<br>
Rp 100.000
<br>
<button onclick="buy('Black Gem Lock','100000')">Beli</button>
</div>

<div class="card">
Mray
<br>
Rp 115.000
<br>
<button onclick="buy('Mray','115000')">Beli</button>
</div>

<div class="card">
IGL
<br>
Rp 20.000
<br>
<button onclick="buy('IGL','20000')">Beli</button>
</div>

<div class="card">
Creative Coin
<br>
Rp 18.000
<br>
<button onclick="buy('Creative Coin','18000')">Beli</button>
</div>

<div class="card">
Lray
<br>
Rp 2.000
<br>
<button onclick="buy('Lray','2000')">Beli</button>
</div>

</div>

</div>


<div class="checkout" id="checkout">

<h3 id="productName"></h3>
Total: Rp <span id="price"></span>

<div class="payment">

Metode Pembayaran:

<br><br>

<button onclick="showQRIS()">QRIS</button>
<button onclick="alert('Dana: 0887437704858')">Dana</button>
<button onclick="alert('Gopay: 081315495903')">Gopay</button>
<button onclick="alert('Paypal: farhanfaza02@gmail.com')">Paypal</button>
<button onclick="alert('USDT BEP20: 0x36DAf416EC3f9dd0B6DE307b7FE807c5940B70eE')">Crypto</button>

</div>

<div class="qris" id="qris" style="display:none;">
<img src="qris.png">
</div>

</div>


<script>

let storeOpen = true

function toggleStore(){

storeOpen = !storeOpen

let status = document.getElementById("status")

if(storeOpen){

status.innerHTML="STORE BUKA"
status.className="status open"

}else{

status.innerHTML="STORE TUTUP"
status.className="status closed"

}

}


function buy(name,price){

if(!storeOpen){

alert("Maaf store sedang tutup")
return

}

document.getElementById("checkout").style.display="block"

document.getElementById("productName").innerText=name
document.getElementById("price").innerText=price

}


function showQRIS(){

document.getElementById("qris").style.display="block"

}

</script>


</body>
</html>
