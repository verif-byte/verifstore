<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verif Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.store-status{
text-align:center;
padding:10px;
background:#16a34a;
}

.slider{
position:relative;
overflow:hidden;
height:220px;
}

.slide-track{
display:flex;
transition:0.5s;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
height:220px;
object-fit:cover;
}

.category{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:80px;
height:80px;
}

button{
background:#3b82f6;
border:none;
color:white;
padding:8px;
margin-top:5px;
border-radius:5px;
cursor:pointer;
}

.checkout{
position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
padding:15px;
display:none;
}

.checkout input{
width:100%;
padding:8px;
margin:5px 0;
}

.qris{
text-align:center;
padding:20px;
}

.qris img{
width:200px;
}

.admin{
position:fixed;
top:10px;
right:10px;
background:#020617;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>Verif Store</header>

<div id="status" class="store-status">
Store Open
</div>

<!-- SLIDER -->

<div class="slider">
<div class="slide-track" id="slider">

<div class="slide">
<img src="images/cps-bgl.png">
</div>

<div class="slide">
<img src="images/cps-blackgl.png">
</div>

<div class="slide">
<img src="images/infinity-gl.png">
</div>

</div>
</div>

<!-- GROW TOPIA -->

<div class="category">

<h2>Growtopia</h2>

<div class="products">

<div class="card">
<img src="images/lray.png">
<h4>1 LRay</h4>
<p id="price-lray">Rp 5.000</p>
<button onclick="buy('1 LRay','price-lray')">Buy</button>
</div>

<div class="card">
<img src="images/mray.png">
<h4>1 MRay</h4>
<p id="price-mray">Rp 45.000</p>
<button onclick="buy('1 MRay','price-mray')">Buy</button>
</div>

</div>

</div>

<!-- CREATIVEPS -->

<div class="category">

<h2>CreativePS</h2>

<div class="products">

<div class="card">
<img src="images/creative-coin.png">
<h4>100 Creative Coin</h4>
<p id="price-coin">Rp 10.000</p>
<button onclick="buy('100 Creative Coin','price-coin')">Buy</button>
</div>

</div>

</div>

<!-- CHECKOUT -->

<div class="checkout" id="checkout">

<h3 id="productName"></h3>

<input id="buyer" placeholder="Nama Pembeli">

<input id="growid" placeholder="GrowID / Username">

<button onclick="showQR()">Bayar</button>

</div>

<!-- QRIS -->

<div class="qris" id="qris" style="display:none">

<h2>Scan QRIS</h2>

<img src="images/qris.png">

<p>Setelah bayar kirim bukti ke admin</p>

</div>

<!-- ADMIN PANEL -->

<div class="admin">

<button onclick="admin()">Admin</button>

</div>

<script>

/* SLIDER */

let slide=0

setInterval(()=>{
slide++
if(slide>2) slide=0
document.getElementById("slider").style.transform=
"translateX(-"+slide*100+"%)"
},3000)

/* CHECKOUT */

function buy(name,priceid){

let price=document.getElementById(priceid).innerText

document.getElementById("productName").innerText=
name+" - "+price

document.getElementById("checkout").style.display="block"

}

/* QRIS */

function showQR(){

document.getElementById("checkout").style.display="none"

document.getElementById("qris").style.display="block"

}

/* ADMIN PANEL */

function admin(){

let pass=prompt("Admin Password")

if(pass!="1234") return

let newPrice=prompt("Ubah harga LRay")

if(newPrice){

document.getElementById("price-lray").innerText=newPrice

}

}

/* STORE CONTROL */

let store=true

function toggleStore(){

store=!store

document.getElementById("status").innerText=
store?"Store Open":"Store Closed"

}

</script>

</body>
</html>
