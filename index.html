<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verif Store</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#ffd700;
}

.container{
padding:20px;
}

.login{
max-width:300px;
margin:auto;
background:#1b1b1b;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
background:#ffd700;
cursor:pointer;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
text-align:center;
}

.card button{
margin-top:10px;
}

.checkout{
background:#1b1b1b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.payment{
background:#111;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.admin{
background:#1b1b1b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>VERIF STORE</header>

<div class="container">

<!-- LOGIN -->

<div id="loginPage" class="login">

<h3>Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- STORE -->

<div id="storePage" class="hidden">

<h2>Produk Topup</h2>

<div class="products" id="productList"></div>

<div class="checkout hidden" id="checkoutBox">

<h3>Checkout</h3>

<input id="playerId" placeholder="Nama / ID Player">

<select id="paymentMethod">
<option>DANA</option>
<option>GOPAY</option>
<option>QRIS</option>
</select>

<div class="payment">

<b>Metode Pembayaran</b>

<br><br>

DANA : 0887437704858<br>
GOPAY : 081315495903

<br><br>

<b>QRIS Scan</b><br>

<img src="qris.png" style="width:100%;border-radius:10px">

<br><br>

Harap transfer sesuai harga produk dan upload bukti pembayaran.

</div>

<input type="file">

<button onclick="order()">Kirim Order</button>

</div>

<!-- ADMIN -->

<div class="admin hidden" id="adminPanel">

<h3>Admin Panel</h3>

<input id="productName" placeholder="Nama Produk">
<input id="productPrice" placeholder="Harga">

<button onclick="addProduct()">Tambah Produk</button>

</div>

</div>

</div>

<script>

let products=[
{name:"Growtopia WL x10",price:"Rp5.000"},
{name:"Growtopia DL x1",price:"Rp50.000"},
{name:"Growtopia BGL x1",price:"Rp500.000"}
]

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user=="admin" && pass=="admin"){

document.getElementById("loginPage").style.display="none"
document.getElementById("storePage").classList.remove("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

loadProducts()

}

else{

document.getElementById("loginPage").style.display="none"
document.getElementById("storePage").classList.remove("hidden")

loadProducts()

}

}

function loadProducts(){

let list=document.getElementById("productList")
list.innerHTML=""

products.forEach((p,i)=>{

list.innerHTML+=`

<div class="card">

<b>${p.name}</b><br>
${p.price}

<button onclick="buy(${i})">Beli</button>

</div>

`

})

}

function buy(i){

document.getElementById("checkoutBox").classList.remove("hidden")

}

function order(){

alert("Order berhasil dikirim! Admin akan memproses setelah pembayaran dicek.")

}

function addProduct(){

let name=document.getElementById("productName").value
let price=document.getElementById("productPrice").value

products.push({name:name,price:price})

loadProducts()

alert("Produk ditambahkan")

}

</script>

</body>
</html>
